<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STAA MAIL - Temp Mail</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>📧 STAA MAIL</h1>

<div class="top-actions">
<button onclick="toggleTheme()">🌙</button>
</div>

</header>


<div class="email-box">

<span id="email"></span>

<button onclick="copyEmail()">Copy</button>

<select id="domain">

<option value="1secmail.com">1secmail.com</option>
<option value="1secmail.org">1secmail.org</option>
<option value="1secmail.net">1secmail.net</option>

</select>

<button onclick="generateEmail()">New Email</button>

</div>


<div class="controls">

<input type="text" id="search" placeholder="Search email">

<button onclick="loadInbox()">Refresh</button>

</div>


<div class="inbox">

<table>

<thead>

<tr>
<th>From</th>
<th>Subject</th>
<th>Date</th>
<th></th>
</tr>

</thead>

<tbody id="inbox"></tbody>

</table>

</div>


<div id="viewer" class="viewer"></div>

<script src="script.js"></script>

</body>
</html>
